<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LCAC CRM</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <!-- ============ LOGIN SCREEN ============ -->
  <div id="login-screen" class="login-screen">
    <form id="login-form" class="login-card" autocomplete="on">
      <h1 class="login-logo">LCAC&nbsp;CRM</h1>
      <p class="login-sub">Lewis County Autism Coalition</p>
      <p class="login-hint">Please sign in to see your contacts and donations.</p>

      <label for="login-email">Email</label>
      <input id="login-email" type="email" autocomplete="username" required placeholder="you@lcautism.org" />

      <label for="login-password">Password</label>
      <input id="login-password" type="password" autocomplete="current-password" required placeholder="Your password" />

      <button type="submit" id="login-btn" class="btn btn-primary btn-block">Sign In</button>
      <p id="login-error" class="error-text" hidden></p>
    </form>
  </div>

  <!-- ============ APP SHELL ============ -->
  <div id="app" class="app" hidden>
    <header class="topbar">
      <div class="topbar-left">
        <button id="nav-toggle" class="nav-toggle" aria-label="Menu">&#9776;</button>
        <span class="brand">LCAC CRM</span>
      </div>
      <div class="topbar-right">
        <span id="user-email" class="user-email"></span>
        <button id="signout-btn" class="btn btn-ghost">Sign Out</button>
      </div>
    </header>

    <div class="body">
      <nav id="sidenav" class="sidenav">
        <button class="navlink active" data-view="dashboard">Dashboard</button>
        <button class="navlink" data-view="contacts">Contacts</button>
        <button class="navlink" data-view="donations">Donations</button>
        <button class="navlink" data-view="inbox">Inbox <span id="inbox-badge" class="badge" hidden>0</span></button>
        <button class="navlink" data-view="reminders">Reminders</button>
        <button class="navlink" data-view="grants">Grants</button>
      </nav>

      <main id="main" class="main">
        <div id="view-dashboard" class="view"></div>
        <div id="view-contacts" class="view" hidden></div>
        <div id="view-donations" class="view" hidden></div>
        <div id="view-inbox" class="view" hidden></div>
        <div id="view-reminders" class="view" hidden></div>
        <div id="view-grants" class="view" hidden></div>
      </main>
    </div>
  </div>

  <!-- ============ MODAL ============ -->
  <div id="modal-overlay" class="modal-overlay" hidden>
    <div class="modal" role="dialog" aria-modal="true">
      <button id="modal-close" class="modal-close" aria-label="Close">&times;</button>
      <div id="modal-content"></div>
    </div>
  </div>

  <!-- ============ TOAST ============ -->
  <div id="toast" class="toast" hidden></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="app.js"></script>
</body>
</html>
